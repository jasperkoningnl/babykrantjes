name: Claude Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run for claude/* branches
    if: startsWith(github.head_ref, 'claude/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: false

      - name: Run tests
        run: npm test
        continue-on-error: false

      - name: Run build
        run: npm run build
        continue-on-error: false

      - name: Check workflow permissions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "ℹ️ Checking if workflow has correct permissions..."
          echo "If this step fails, check: Settings → Actions → Workflow permissions"
          echo "Required: ✓ Read and write permissions"
          echo "Required: ✓ Allow GitHub Actions to create and approve pull requests"

      - name: Auto-approve PR
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "🤖 Attempting to auto-approve PR #$PR_NUMBER..."
          if gh pr review $PR_NUMBER --approve --body "✅ Auto-approved by Claude Auto-Merge workflow. All checks passed."; then
            echo "✅ PR approved successfully!"
          else
            echo "❌ Failed to approve PR. Check workflow permissions!"
            echo "Go to: Settings → Actions → Workflow permissions"
            echo "Enable: 'Allow GitHub Actions to create and approve pull requests'"
            exit 1
          fi

      - name: Enable auto-merge
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "🔀 Enabling auto-merge for PR #$PR_NUMBER..."
          gh pr merge $PR_NUMBER --auto --squash --delete-branch || echo "⚠️ Auto-merge scheduling failed, will try immediate merge..."

      - name: Merge PR immediately
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "⏳ Waiting for checks to complete..."
          sleep 3
          echo "🚀 Attempting immediate merge..."
          if gh pr merge $PR_NUMBER --squash --delete-branch; then
            echo "✅ PR merged and branch deleted successfully!"
          else
            echo "ℹ️ Could not merge immediately. Auto-merge will trigger when all required checks pass."
          fi

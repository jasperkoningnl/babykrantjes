name: Exporteer jaar uit Redis naar statisch JSON

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Jaar om te exporteren (bijv. 2025)'
        required: true

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Export jaar uit Redis
        env:
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: npx tsx scripts/export-year.ts --year ${{ github.event.inputs.year }}

      - name: Commit resultaten
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache/news/news-${{ github.event.inputs.year }}.json
          git diff --staged --quiet || git commit -m "chore: news cache jaar ${{ github.event.inputs.year }} (export uit Redis)"
          git push

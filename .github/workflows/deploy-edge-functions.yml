# Deployt de Supabase Edge Functions zonder lokale CLI (Jasper werkt
# alleen online). Draait automatisch bij wijzigingen in supabase/functions/
# op main, en is handmatig te starten via Actions → "Deploy Edge Functions"
# → Run workflow.
#
# Vereist twee repository secrets (GitHub → Settings → Secrets and
# variables → Actions):
# - SUPABASE_ACCESS_TOKEN  persoonlijk token van
#   https://supabase.com/dashboard/account/tokens
# - SUPABASE_PROJECT_ID    het project-ref (de xxxxx uit
#   https://xxxxx.supabase.co)
name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy alle Edge Functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
